<!DOCTYPE html>
<html lang="pt-BR">
  <<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aventura na Masmorra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/css/main.css" />
  </head>

  <body>
    <div id="game-wrapper">
      <div id="start-menu">
        <h1 id="game-title">Aventura na Masmorra</h1>
        <p id="game-subtitle">Pressione o botão para iniciar sua jornada.</p>
        <button id="start-button" class="pixel-button pixel-button--confirm">
          Iniciar Jogo
        </button>
      </div>

      <div id="hud" class="hidden">
        <div class="hud-top">
          <div class="hud-health-section">
            <img
              src="./images/saude.png"
              alt="Ícone de Vida"
              class="health-icon"
            />
            <div id="player-health-container">
              <div id="player-health-bar"></div>
              <span id="player-health-text" class="hidden">100</span>
            </div>
          </div>

          <div class="hud-stats">
            <p>Fase: <span id="phase-text">1</span></p>
          </div>
          <button id="pause-button" class="pixel-button">Pause</button>
        </div>
        <div class="hud-bottom">
          <p id="objective-text"></p>
        </div>
      </div>

      <div id="game-container" class="hidden">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="boss-health-container" class="hidden">
          <div id="boss-health-bar"></div>
        </div>

        <div id="pause-menu" class="hidden">
          <h1 id="pause-title">Pausado</h1>
          <button id="resume-button" class="pixel-button pixel-button--confirm">
            Continuar
          </button>
          <button
            id="restart-pause-button"
            class="pixel-button pixel-button--danger"
          >
            Reiniciar
          </button>
        </div>

        <div id="message-screen" class="hidden">
          <h1 id="message-title"></h1>
          <p id="message-subtitle"></p>
          <button id="restart-button" class="pixel-button pixel-button--danger">
            Reiniciar
          </button>
          <button id="continue-button" class="pixel-button hidden">
            Continuar
          </button>
        </div>
      </div>
    </div>

    <audio id="game-soundtrack" loop></audio>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
